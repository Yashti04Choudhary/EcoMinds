<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Map | EcoMind AI</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
      #map { height: 60vh; width: 100%; border-radius: 12px; margin: 2rem 0; }
      .map-info { text-align: center; margin-bottom: 2rem; }
    </style>
</head>
<body>
  <header class="page-navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">EcoMind AI</a>
      <nav class="navbar-links">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="schedule.html">Schedule Pickup</a></li>
          <li><a href="locator.html" class="active">Map</a></li>
        </ul>
      </nav>
      <div id="logout-menu" style="display: none;" class="navbar-logout">
        <button id="logout-btn" class="btn-logout">Logout <i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </header>

  <main class="map-container">
    <div class="map-info">
      <h2>Find E-Waste Collection Points Near You</h2>
      <p>The map below shows your location and nearby recycling centers.</p>
    </div>
    <div id="map"></div>
  </main>

  <footer class="footer">
    <p>© 2025 AI4E-Waste. Built with love for a cleaner Earth 💚</p>
  </footer>
    <!-- Firebase SDK (v8) for App + Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Firebase Config + Auth -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Locator Map Logic -->
    <script src="js/locator.js"></script>
</body>
</html>
